version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: analytics-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 4G

  backend:
    build: ./backend
    container_name: analytics-backend
    ports:
      - "8000:8000"
    volumes:
      - analytics_data:/app/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-32chars-min}
      - DEBUG=${DEBUG:-false}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-qwen2.5:1.5b}
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: analytics-frontend
    ports:
      - "80:80"
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  analytics_data:
